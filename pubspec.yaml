name: faseh
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.2.0
  audioplayers: ^5.2.1
  record: ^6.1.1
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  shared_preferences: ^2.2.2

# إعدادات الأيقونة (يجب أن تبدأ من أول السطر)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FCF9EA"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true

  # تفعيل مجلد الصور
  assets:
    - assets/images/